{% extends 'base.html' %}
{% block content %}
<h2 style="margin: 1.5rem 0 1rem;">All Notes</h2>

<a href="/add" class="btn btn-primary" style="margin-bottom:1.5rem; display:inline-block;">+ New Note</a>

{% if notes %}
  {% for note in notes %}
  <div style="background:white; border-left: 4px solid #2c2c2c; padding:1rem 1.5rem; margin-bottom:1rem; border-radius:4px; box-shadow: 0 1px 4px rgba(0,0,0,0.07);">
    <h3 style="margin-bottom:0.3rem;">{{ note.title }}</h3>
    <p style="color:#555; margin-bottom:0.8rem;">{{ note.content }}</p>
    <small style="color:#999;">{{ note.created_at.strftime('%B %d, %Y') }}</small>
    <div style="margin-top:0.8rem; display:flex; gap:0.5rem;">
      <a href="/edit/{{ note.id }}" class="btn btn-secondary">Edit</a>
      <form action="/delete/{{ note.id }}" method="POST" style="display:inline;">
        <button type="submit" class="btn btn-danger" onclick="return confirm('Delete this note?')">Delete</button>
      </form>
    </div>
  </div>
  {% endfor %}
{% else %}
  <p style="margin-top:2rem; color:#777;">No notes yet. <a href="/add">Create your first note →</a></p>
{% endif %}
{% endblock %}

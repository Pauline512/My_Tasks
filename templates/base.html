<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Notes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Georgia', serif;
      background: #f5f0e8;
      color: #2c2c2c;
      min-height: 100vh;
    }
    nav {
      background: #2c2c2c;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    nav a { color: #f5f0e8; text-decoration: none; font-size: 1.2rem; }
    nav .brand { font-size: 1.5rem; font-weight: bold; letter-spacing: 1px; }
    .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    .btn {
      display: inline-block;
      padding: 0.5rem 1.2rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.95rem;
      text-decoration: none;
    }
    .btn-primary { background: #2c2c2c; color: #f5f0e8; }
    .btn-danger  { background: #c0392b; color: white; }
    .btn-secondary { background: #888; color: white; }
    .btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <nav>
    <a class="brand" href="/">📓 Student Notes</a>
    <a href="/add" class="btn btn-primary">+ New Note</a>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
